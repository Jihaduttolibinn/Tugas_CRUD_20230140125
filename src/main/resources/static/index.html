<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kependudukan - Manajemen KTP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Manajemen Data KTP</h1>
            <p>Sistem Informasi Kependudukan Digital</p>
        </header>

        <main>
            <section class="card form-section">
                <h2 id="form-title">Tambah Data KTP</h2>
                <form id="ktp-form">
                    <input type="hidden" id="ktp-id">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nomorKtp">Nomor KTP</label>
                            <input type="text" id="nomorKtp" name="nomorKtp" maxlength="16" placeholder="Masukkan 16 digit NIK" required>
                        </div>
                        <div class="form-group">
                            <label for="namaLengkap">Nama Lengkap</label>
                            <input type="text" id="namaLengkap" name="namaLengkap" placeholder="Nama sesuai KTP" required>
                        </div>
                        <div class="form-group">
                            <label for="tanggalLahir">Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" name="tanggalLahir" required>
                        </div>
                        <div class="form-group">
                            <label for="jenisKelamin">Jenis Kelamin</label>
                            <select id="jenisKelamin" name="jenisKelamin" required>
                                <option value="" disabled selected>Pilih Jenis Kelamin</option>
                                <option value="LAKI-LAKI">Laki-laki</option>
                                <option value="PEREMPUAN">Perempuan</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="alamat">Alamat</label>
                            <textarea id="alamat" name="alamat" rows="3" placeholder="Alamat domisili lengkap" required></textarea>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="btn-save" class="btn btn-primary">Simpan Data</button>
                        <button type="button" id="btn-cancel" class="btn btn-secondary" style="display: none;">Batal</button>
                    </div>
                </form>
            </section>

            <section class="card table-section">
                <h2>Daftar Kependudukan</h2>
                <div class="table-container">
                    <table id="ktp-table">
                        <thead>
                            <tr>
                                <th>NIK</th>
                                <th>Nama Lengkap</th>
                                <th>Jenis Kelamin</th>
                                <th>Tanggal Lahir</th>
                                <th>Alamat</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="ktp-list">
                            <!-- Data will be loaded here via Ajax -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div id="notification" class="notification"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
